<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon Game</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d0d 100%);
  width: 100vw;
  height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  user-select: none;
}

/* ── Outer wrapper ── */
#wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 28px;
}

/* ── Simon board ── */
#game {
  position: relative;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 8px;
  border-radius: 50%;
  overflow: hidden;
  /* size set by JS */
}

/* ── Color buttons ── */
.btn {
  cursor: pointer;
  border: none;
  outline: none;
  transition: filter 0.08s ease, transform 0.08s ease;
  filter: brightness(0.42) saturate(0.65);
  -webkit-tap-highlight-color: transparent;
}
.btn:focus-visible { outline: 3px solid #fff8; outline-offset: 2px; }
.btn:hover { filter: brightness(0.55) saturate(0.8); }
.btn.lit   { filter: brightness(1.2) saturate(1.3) !important; transform: scale(1.018); }

#btn-green  { background: #22c55e; border-radius: 50% 0 0 0; }
#btn-red    { background: #ef4444; border-radius: 0 50% 0 0; }
#btn-yellow { background: #eab308; border-radius: 0 0 0 50%; }
#btn-blue   { background: #3b82f6; border-radius: 0 0 50% 0; }

/* ── Center disk ── */
#center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 32%; height: 32%;
  background: #111;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  z-index: 10;
  box-shadow:
    0 0 0 4px #1a1a1a,
    0 0 0 7px #2e2e2e;
  pointer-events: none;
}

#score {
  font-size: clamp(20px, 5.5vw, 36px);
  font-weight: 700;
  color: #fff;
  letter-spacing: 3px;
  text-shadow: 0 0 14px rgba(255,255,255,0.5);
}

#status {
  font-family: sans-serif;
  font-size: clamp(7px, 1.9vw, 12px);
  color: #777;
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: center;
  padding: 0 6px;
  line-height: 1.3;
}

/* ── Start / Reset button ── */
#startBtn {
  background: transparent;
  border: 1px solid #444;
  color: #999;
  padding: 10px 32px;
  border-radius: 24px;
  font-size: 13px;
  font-family: sans-serif;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
  white-space: nowrap;
}
#startBtn:hover {
  border-color: #aaa;
  color: #fff;
  background: rgba(255,255,255,0.05);
}
#startBtn:active { transform: scale(0.97); }

/* ── Best score label ── */
#best {
  font-family: sans-serif;
  font-size: 11px;
  color: #555;
  letter-spacing: 1px;
  text-align: center;
}
</style>
</head>
<body>
<div id="wrap">
  <div id="game">
    <button class="btn" id="btn-green"  aria-label="緑ボタン"></button>
    <button class="btn" id="btn-red"    aria-label="赤ボタン"></button>
    <button class="btn" id="btn-yellow" aria-label="黄ボタン"></button>
    <button class="btn" id="btn-blue"   aria-label="青ボタン"></button>
    <div id="center" aria-live="polite" aria-atomic="true">
      <div id="score">--</div>
      <div id="status">Press Start</div>
    </div>
  </div>
  <button id="startBtn">▶ Start</button>
  <div id="best">Best Score: 0</div>
</div>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Simon Game — core logic
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

const COLORS = ['green', 'red', 'yellow', 'blue'];
const FREQS  = { green: 415, red: 310, yellow: 252, blue: 209 };

let sequence = [];
let playerStep = 0;
let playing   = false;
let canClick  = false;
let bestScore = 0;

const scoreEl  = document.getElementById('score');
const statusEl = document.getElementById('status');
const bestEl   = document.getElementById('best');
const startBtn = document.getElementById('startBtn');
const gameEl   = document.getElementById('game');

/* ── Responsive sizing ── */
function resize() {
  const vw   = window.innerWidth;
  const vh   = window.innerHeight;
  const size = Math.min(vw * 0.92, vh * 0.68, 500);
  gameEl.style.width  = size + 'px';
  gameEl.style.height = size + 'px';
  gameEl.style.gap    = Math.max(6, size * 0.016) + 'px';
}
resize();
window.addEventListener('resize', resize);
// dvh changes (keyboard / tab bar)
if ('visualViewport' in window) {
  window.visualViewport.addEventListener('resize', resize);
}

/* ── Web Audio ── */
let actx = null;
function getAudioCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function beep(color, durMs = 320) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = FREQS[color];
    osc.type = 'sine';
    const t = ctx.currentTime;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.38, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + durMs / 1000);
    osc.start(t);
    osc.stop(t + durMs / 1000 + 0.06);
  } catch (e) { /* silently ignore */ }
}

function errorBeep() {
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 110;
    osc.type = 'square';
    const t = ctx.currentTime;
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    osc.start(t);
    osc.stop(t + 0.65);
  } catch (e) {}
}

/* ── Light a button ── */
function light(color, durMs) {
  return new Promise(resolve => {
    const el = document.getElementById('btn-' + color);
    el.classList.add('lit');
    beep(color, durMs);
    setTimeout(() => { el.classList.remove('lit'); resolve(); }, durMs);
  });
}

/* ── Play the current sequence ── */
async function playSequence() {
  canClick = false;
  statusEl.textContent = 'Watch!';
  const len   = sequence.length;
  const speed = len < 5 ? 560 : len < 9 ? 440 : len < 14 ? 350 : 280;
  const gap   = speed * 0.26;

  for (const color of sequence) {
    await light(color, speed - 80);
    await delay(gap);
  }

  playerStep = 0;
  canClick   = true;
  statusEl.textContent = "It's your turn!";
}

/* ── Advance to next round ── */
function nextRound() {
  sequence.push(COLORS[Math.floor(Math.random() * 4)]);
  setScore(sequence.length - 1);
  setTimeout(playSequence, 650);
}

/* ── Score display ── */
function setScore(n) {
  scoreEl.textContent = n < 0 ? '--' : String(n).padStart(2, '0');
}

/* ── Start game ── */
function startGame() {
  sequence   = [];
  playerStep = 0;
  playing    = true;
  startBtn.textContent = '■ Reset';
  setScore(0);
  statusEl.textContent = 'Ready...';
  nextRound();
}

/* ── Reset game ── */
function resetGame() {
  playing    = false;
  canClick   = false;
  sequence   = [];
  setScore(-1);
  statusEl.textContent = 'Press Start';
  startBtn.textContent = '▶ Start';
}

/* ── Handle player click ── */
async function handleClick(color) {
  if (!canClick || !playing) return;
  canClick = false; // prevent double-tap during animation

  await light(color, 240);

  // Wrong button
  if (color !== sequence[playerStep]) {
    errorBeep();
    const finalScore = sequence.length - 1;
    if (finalScore > bestScore) {
      bestScore = finalScore;
      bestEl.textContent = 'Best Score: ' + bestScore;
    }
    statusEl.textContent = '× Game Over';
    setScore(finalScore);
    playing  = false;
    startBtn.textContent = '▶ Play Again';
    await delay(1400);
    scoreEl.textContent  = '--';
    statusEl.textContent = 'Best Score: ' + bestScore;
    return;
  }

  playerStep++;

  // Completed the full sequence
  if (playerStep === sequence.length) {
    statusEl.textContent = '✓ Clear!';
    setScore(sequence.length);
    await delay(750);
    nextRound();
  } else {
    canClick = true; // allow next tap
  }
}

/* ── Utility ── */
function delay(ms) {
  return new Promise(r => setTimeout(r, ms));
}

/* ── Event listeners ── */
COLORS.forEach(c => {
  const el = document.getElementById('btn-' + c);
  el.addEventListener('click', () => handleClick(c));
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    handleClick(c);
  }, { passive: false });
});

startBtn.addEventListener('click', () => {
  if (!playing) startGame();
  else          resetGame();
});
</script>
</body>
</html>
