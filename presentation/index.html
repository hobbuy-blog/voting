<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Slides Creator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@v3.11.0/dist/pptxgen.bundle.js"></script>
</head>
<body>

    <div class="ribbon">
        <div class="ribbon-tabs">
            <button class="tab-link active" data-tab="tab-home">Home</button>
            <button class="tab-link" data-tab="tab-insert">Insert</button>
            <button class="tab-link" data-tab="tab-animation">Animation</button>
            <button class="tab-link" data-tab="tab-export">Export</button>
        </div>
        
        <div class="ribbon-content">
            <div class="tab-pane active" id="tab-home">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="undo-btn" disabled title="Undo (Ctrl+Z)">Undo</button>
                        <button id="redo-btn" disabled title="Redo (Ctrl+Y)">Redo</button>
                    </div>
                    <div class="group-label">History</div>
                </div>
                <div class="ribbon-group text-only-tools" style="display: none;">
                    <div class="group-buttons">
                        <select id="font-family">
                            <option value="'Inter', 'Noto Sans JP', sans-serif">Standard (Inter)</option>
                            <option value="'Georgia', serif">Serif (Georgia)</option>
                            <option value="'Courier New', monospace">Monospace</option>
                        </select>
                        <input type="number" id="font-size" value="32" min="12" max="120" style="width: 60px;">
                        <div class="color-picker-wrapper">
                            <input type="color" id="element-color" value="#0f172a">
                        </div>
                    </div>
                    <div class="group-label">Font Style</div>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="bring-front-btn" class="secondary">Bring Front</button>
                        <button id="send-back-btn" class="secondary">Send Back</button>
                        <button id="delete-btn" class="danger">Delete</button>
                    </div>
                    <div class="group-label">Arrange</div>
                </div>
            </div>

            <div class="tab-pane" id="tab-insert">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="add-text-btn" class="primary">+ Text Box</button>
                        <button id="add-rect-btn" class="secondary">+ Shape (Rect)</button>
                        <button id="add-image-btn" class="secondary">+ Image</button>
                        <input type="file" id="image-upload" accept="image/*" style="display: none;">
                    </div>
                    <div class="group-label">Standard Components</div>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="btn-import-pdf" class="secondary">Convert PDF to Slides</button>
                        <input type="file" id="pdf-file-input" accept="application/pdf" style="display: none;">
                    </div>
                    <div class="group-label">Advanced Import</div>
                </div>
            </div>

            <div class="tab-pane" id="tab-animation">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button class="anim-set-btn active" data-anim="none">None</button>
                        <button class="anim-set-btn" data-anim="fade">Fade In</button>
                        <button class="anim-set-btn" data-anim="pop">Pop</button>
                        <button class="anim-set-btn" data-anim="slide-up">Slide Up</button>
                        <button class="anim-set-btn" data-anim="zoom-in">Zoom In</button>
                    </div>
                    <div class="group-label">Transition Animations</div>
                </div>
            </div>

            <div class="tab-pane" id="tab-export">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="present-btn" class="primary">Play Slideshow</button>
                    </div>
                    <div class="group-label">Preview</div>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="export-pdf-btn" class="secondary">Save as PDF</button>
                        <button id="export-pptx-btn" class="secondary">Save as PowerPoint (.pptx)</button>
                    </div>
                    <div class="group-label">File Generation</div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-body">
        <div class="slide-navigator">
            <div id="slide-list">
                </div>
            <button id="add-slide-btn">+ New Slide</button>
        </div>
        
        <div class="canvas-area">
            <div id="canvas-container">
                <div id="canvas" class="slide-canvas">
                    </div>
            </div>
        </div>
    </div>

    <div id="floating-menu" class="floating-menu hidden">
        <div class="float-group">
            <select id="float-anim-select">
                <option value="none">No Anim</option>
                <option value="fade">Fade</option>
                <option value="pop">Pop</option>
                <option value="slide-up">SlideUp</option>
                <option value="zoom-in">ZoomIn</option>
            </select>
        </div>
        <div class="float-group">
            <div class="color-picker-wrapper mini">
                <input type="color" id="float-color" value="#000000">
            </div>
        </div>
        <div class="float-group">
            <button id="float-layer-front" title="Bring to Front">▲ Front</button>
            <button id="float-delete" class="danger" title="Delete Element">Delete</button>
        </div>
    </div>

    <div id="presenter-controls" class="hidden">
        <button id="prev-slide">◀ Prev</button>
        <span id="slide-number">1 / 1</span>
        <button id="next-slide">Next ▶</button>
        <button id="exit-present-btn" class="danger">Exit</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
