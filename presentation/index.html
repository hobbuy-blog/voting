<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leaslide | Simple, Easy, Present.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Kaisei+Tokumin&family=Kiwi+Maru&family=M+PLUS+1p:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=RocknRoll+One&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';</script>
</head>
<body>
<div id="app">

    <!-- ── カラーパレット フロートウィンドウ ── -->
    <div id="color-picker-float" class="color-float hidden">
        <div class="color-float-header">
            <span id="color-float-title">Color</span>
            <button id="color-float-close" class="color-float-close">✕</button>
        </div>
        <div class="color-swatches" id="color-swatches"></div>
        <div class="color-float-custom">
            <label style="font-size:0.72rem;color:var(--text-muted)">Custom</label>
            <input type="color" id="color-custom-input" value="#000000">
            <button id="color-custom-apply" class="color-apply-btn">Apply</button>
        </div>
    </div>

    <header class="ribbon">
        <div class="ribbon-tabs">
            <div class="ribbon-logo">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <rect width="18" height="18" rx="4" fill="#2563eb"/>
                    <rect x="3" y="3" width="5" height="5" rx="1" fill="white" opacity="0.9"/>
                    <rect x="10" y="3" width="5" height="5" rx="1" fill="white" opacity="0.55"/>
                    <rect x="3" y="10" width="5" height="5" rx="1" fill="white" opacity="0.55"/>
                    <rect x="10" y="10" width="5" height="5" rx="1" fill="#93c5fd" opacity="0.9"/>
                </svg>
                <span>Leaslide</span>
            </div>
            <button class="tab-link active" onclick="openTab(event,'tab-file')">File</button>
            <button class="tab-link" onclick="openTab(event,'tab-home')">Home</button>
            <button class="tab-link" onclick="openTab(event,'tab-insert')">Insert</button>
            <button class="tab-link" onclick="openTab(event,'tab-design')">Design</button>
            <button class="tab-link" onclick="openTab(event,'tab-trans')">Transition</button>
            <button class="tab-link" onclick="openTab(event,'tab-animation')">Animation</button>
            <button class="tab-link" onclick="openTab(event,'tab-slideshow')">Slideshow</button>
            <button class="tab-link" onclick="openTab(event,'tab-proofread')">Proofreading</button>
            <button class="tab-link" onclick="openTab(event,'tab-display')">Display</button>
        </div>

        <div class="ribbon-content">

            <!-- FILE -->
            <div id="tab-file" class="tab-pane active">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="btn-import-pdf" class="icon-btn secondary">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 2h7l3 3v9H3V2z" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M10 2v3h3" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
                            Import PDF
                        </button>
                        <input type="file" id="pdf-file-input" accept=".pdf" style="display:none;">
                        <button id="btn-import-pptx" class="icon-btn secondary">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 2h7l3 3v9H3V2z" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M10 2v3h3" stroke="currentColor" stroke-width="1.4" fill="none"/><rect x="5" y="8" width="4" height="3" rx="1" fill="currentColor" opacity="0.5"/></svg>
                            Import PPTX
                        </button>
                        <input type="file" id="pptx-file-input" accept=".pptx" style="display:none;">
                    </div>
                    <span class="group-label">Import</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="export-pdf-btn" class="icon-btn">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                            Export PDF
                        </button>
                        <button id="export-pptx-btn" class="icon-btn">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                            Export PPTX
                        </button>
                    </div>
                    <span class="group-label">Export</span>
                </div>
            </div>

            <!-- HOME -->
            <div id="tab-home" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="undo-btn" class="icon-btn" title="Ctrl+Z">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 7.5A5 5 0 1 1 5.5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3 3.5v4h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            Undo
                        </button>
                        <button id="redo-btn" class="icon-btn" title="Ctrl+Y">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M13 7.5A5 5 0 1 0 10.5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M13 3.5v4H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            Redo
                        </button>
                    </div>
                    <span class="group-label">History</span>
                </div>
                <div class="ribbon-group" id="text-tools">
                    <div class="group-buttons">
                        <select id="font-family" title="フォント">
                            <option value="'Noto Sans JP', sans-serif">Noto Sans JP</option>
                            <option value="'Noto Serif JP', serif">Noto Serif JP</option>
                            <option value="'M PLUS 1p', sans-serif">M PLUS 1p</option>
                            <option value="'Kaisei Tokumin', serif">解星特ミン</option>
                            <option value="'RocknRoll One', sans-serif">RocknRoll</option>
                            <option value="'DotGothic16', sans-serif">DotGothic16</option>
                            <option value="'Kiwi Maru', serif">Kiwi Maru</option>
                            <option value="'Yuji Syuku', serif">Yuji Syuku</option>
                        </select>
                        <input type="number" id="font-size" value="32" title="フォントサイズ" style="width:54px;">
                        <button id="bold-btn" class="font-style-btn" title="太字"><b>B</b></button>
                        <button id="italic-btn" class="font-style-btn" title="斜体"><i>I</i></button>
                        <button id="text-color-btn" class="color-trigger-btn" title="文字色" data-target="text">
                            <span class="color-preview" id="text-color-preview" style="background:#0f172a;"></span>
                            <svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 2l3 4 3-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                        </button>
                    </div>
                    <span class="group-label">Font</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="align-left-btn" class="icon-btn icon-only" title="左揃え">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                        </button>
                        <button id="align-center-btn" class="icon-btn icon-only" title="中央揃え">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M4 8h8M3 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                        </button>
                        <button id="align-right-btn" class="icon-btn icon-only" title="右揃え">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M6 8h8M4 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                        </button>
                    </div>
                    <span class="group-label">Align Text</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="bring-front-btn" class="icon-btn" title="前面へ">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4" fill="none"/><rect x="2" y="2" width="8" height="8" rx="1.5" fill="white" stroke="currentColor" stroke-width="1.4"/></svg>
                            Forward
                        </button>
                        <button id="send-back-btn" class="icon-btn" title="背面へ">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4" fill="none"/><rect x="5" y="5" width="8" height="8" rx="1.5" fill="white" stroke="currentColor" stroke-width="1.4"/></svg>
                            Backward
                        </button>
                        <button id="duplicate-btn" class="icon-btn" title="複製 (Ctrl+D)">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4" fill="none"/><rect x="2" y="2" width="8" height="8" rx="1.5" fill="white" stroke="currentColor" stroke-width="1.4"/></svg>
                            Duplicate
                        </button>
                        <button id="delete-btn" class="icon-btn danger" title="削除 (Del)">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 5h10M6 5V3h4v2M6 8v4M10 8v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M4 5l.7 7.3A1 1 0 005.7 13h4.6a1 1 0 001-.7L12 5" stroke="currentColor" stroke-width="1.4"/></svg>
                            Delete
                        </button>
                    </div>
                    <span class="group-label">Element</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="shape-color-btn" class="color-trigger-btn" title="図形色" data-target="shape">
                            <span class="color-preview" id="shape-color-preview" style="background:#2563eb;"></span>
                            <svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 2l3 4 3-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                        </button>
                        <label style="font-size:0.72rem;color:var(--text-muted)">Fill</label>
                    </div>
                    <span class="group-label">Shape Color</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <label style="font-size:0.72rem;color:var(--text-muted);display:flex;align-items:center;gap:4px;">
                            <input type="checkbox" id="snap-toggle" checked> Snap
                        </label>
                    </div>
                    <span class="group-label">Options</span>
                </div>
            </div>

            <!-- INSERT -->
            <div id="tab-insert" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="add-text-btn" class="icon-btn">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 4h10M8 4v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                            Textbox
                        </button>
                        <button id="add-rect-btn" class="icon-btn">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="4" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
                            Rectangle
                        </button>
                        <button id="add-circle-btn" class="icon-btn">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
                            Circle
                        </button>
                        <button id="add-line-btn" class="icon-btn">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 14L14 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                            Line
                        </button>
                        <button id="add-image-btn" class="icon-btn">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4" fill="none"/><circle cx="5.5" cy="6.5" r="1" fill="currentColor"/><path d="M2 11l3.5-3.5L8 10l2-2 4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            Image
                        </button>
                        <input type="file" id="image-upload" accept="image/*" style="display:none;">
                    </div>
                    <span class="group-label">Basic Element</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="insert-arrow-btn" class="icon-btn">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 8h10M9 5l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            Arrow
                        </button>
                        <button id="insert-star-btn" class="icon-btn">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2l1.6 3.4 3.7.5-2.7 2.6.6 3.7L8 10.4l-3.2 1.8.6-3.7L2.7 5.9l3.7-.5z" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>
                            Star
                        </button>
                    </div>
                    <span class="group-label">Shapes</span>
                </div>
            </div>

            <!-- DESIGN -->
            <div id="tab-design" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <select id="slide-size-select" style="font-size:0.76rem;padding:4px 6px;border-radius:5px;border:1px solid var(--ribbon-border);">
                            <option value="1920x1080" selected>16:9 (1920×1080)</option>
                            <option value="1280x720">16:9 (1280×720)</option>
                            <option value="1024x768">4:3 (1024×768)</option>
                        </select>
                    </div>
                    <span class="group-label">Canvas Size</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="bg-color-btn" class="color-trigger-btn" title="背景色" data-target="bg">
                            <span class="color-preview" id="bg-color-preview" style="background:#ffffff;border:1px solid #e2e8f0;"></span>
                            <svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 2l3 4 3-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                        </button>
                        <label style="font-size:0.72rem;color:var(--text-muted)">BG Color</label>
                    </div>
                    <span class="group-label">Background</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button class="theme-swatch" data-bg="#ffffff" title="White" style="background:#fff;border-color:#e2e8f0;"></button>
                        <button class="theme-swatch" data-bg="#0f172a" title="Dark" style="background:#0f172a;"></button>
                        <button class="theme-swatch" data-bg="linear-gradient(135deg,#3b82f6,#1d4ed8)" title="Blue" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8);"></button>
                        <button class="theme-swatch" data-bg="linear-gradient(135deg,#ec4899,#8b5cf6)" title="Pink" style="background:linear-gradient(135deg,#ec4899,#8b5cf6);"></button>
                        <button class="theme-swatch" data-bg="linear-gradient(135deg,#f59e0b,#e11d48)" title="Warm" style="background:linear-gradient(135deg,#f59e0b,#e11d48);"></button>
                        <button class="theme-swatch" data-bg="linear-gradient(135deg,#10b981,#2563eb)" title="Green" style="background:linear-gradient(135deg,#10b981,#2563eb);"></button>
                    </div>
                    <span class="group-label">Themes</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="opacity-down-btn" class="icon-btn icon-only">−</button>
                        <span id="opacity-label" style="font-size:0.72rem;color:var(--text-muted);min-width:32px;text-align:center;">100%</span>
                        <button id="opacity-up-btn" class="icon-btn icon-only">＋</button>
                    </div>
                    <span class="group-label">Opacity</span>
                </div>
            </div>

            <!-- TRANSITION -->
            <div id="tab-trans" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button class="trans-btn icon-btn" data-trans="none">None</button>
                        <button class="trans-btn icon-btn" data-trans="fade">Fade</button>
                        <button class="trans-btn icon-btn" data-trans="slide">Slide</button>
                        <button class="trans-btn icon-btn" data-trans="zoom">Zoom</button>
                    </div>
                    <span class="group-label">Slide Transition</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <label style="font-size:0.72rem;color:var(--text-muted)">Speed</label>
                        <select id="trans-speed" style="font-size:0.76rem;padding:4px 6px;border-radius:5px;border:1px solid var(--ribbon-border);">
                            <option value="0.4">Fast</option>
                            <option value="0.7" selected>Normal</option>
                            <option value="1.2">Slow</option>
                        </select>
                    </div>
                    <span class="group-label">Duration</span>
                </div>
            </div>

            <!-- ANIMATION -->
            <div id="tab-animation" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button class="anim-set-btn icon-btn" data-anim="none">None</button>
                        <button class="anim-set-btn icon-btn" data-anim="fade">Fade</button>
                        <button class="anim-set-btn icon-btn" data-anim="pop">Pop</button>
                        <button class="anim-set-btn icon-btn" data-anim="slide-up">Slide Up</button>
                        <button class="anim-set-btn icon-btn" data-anim="zoom-in">Zoom In</button>
                    </div>
                    <span class="group-label">Element Effect</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <label style="font-size:0.72rem;color:var(--text-muted)">Delay</label>
                        <input type="number" id="anim-delay" value="0" min="0" max="5" step="0.1" style="width:54px;">
                        <label style="font-size:0.72rem;color:var(--text-muted)">s</label>
                    </div>
                    <span class="group-label">Delay</span>
                </div>
            </div>

            <!-- SLIDESHOW -->
            <div id="tab-slideshow" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="present-btn" class="icon-btn primary">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M5 3l8 5-8 5V3z" fill="white"/></svg>
                            Start Slideshow
                        </button>
                        <button id="present-from-start-btn" class="icon-btn secondary">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 3v10M6 3l7 5-7 5V3z" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
                            From Beginning
                        </button>
                    </div>
                    <span class="group-label">Presentation</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <label style="font-size:0.72rem;color:var(--text-muted)">Auto</label>
                        <input type="number" id="auto-advance" value="0" min="0" max="60" style="width:52px;">
                        <label style="font-size:0.72rem;color:var(--text-muted)">s</label>
                    </div>
                    <span class="group-label">Timer</span>
                </div>
            </div>

            <!-- PROOFREADING -->
            <div id="tab-proofread" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="word-count-btn" class="icon-btn">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 5h12M2 8h8M2 11h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                            Word Count
                        </button>
                        <button id="spellcheck-btn" class="icon-btn secondary">Stats</button>
                    </div>
                    <span class="group-label">Text Tools</span>
                </div>
                <div id="proofread-result" class="ribbon-group" style="display:none;">
                    <div class="group-buttons">
                        <span id="proofread-text" style="font-size:0.76rem;color:var(--text-muted);max-width:220px;"></span>
                    </div>
                    <span class="group-label">Result</span>
                </div>
            </div>

            <!-- DISPLAY -->
            <div id="tab-display" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="zoom-out-btn" class="icon-btn icon-only" title="Zoom Out">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M10.5 10.5L14 14M5 7h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                        </button>
                        <span id="zoom-label" style="font-size:0.76rem;color:var(--text-muted);min-width:38px;text-align:center;">50%</span>
                        <button id="zoom-in-btn" class="icon-btn icon-only" title="Zoom In">
                            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M10.5 10.5L14 14M7 5v4M5 7h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                        </button>
                        <button id="zoom-reset-btn" class="icon-btn secondary" style="font-size:0.72rem;">Reset</button>
                    </div>
                    <span class="group-label">Zoom</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="toggle-grid-btn" class="icon-btn secondary">Grid</button>
                        <button id="toggle-ruler-btn" class="icon-btn secondary">Ruler</button>
                    </div>
                    <span class="group-label">View</span>
                </div>
            </div>

        </div>
    </header>

    <div class="main-body">

        <!-- 左：スライドパネル -->
        <aside class="slide-navigator">
            <div class="slide-nav-header">
                <span>Slides</span>
                <button id="add-slide-btn" class="slide-nav-add" title="スライド追加">＋</button>
            </div>
            <div id="slide-list"></div>
            <button id="delete-slide-btn" class="slide-nav-del">Delete Slide</button>
        </aside>

        <!-- 中央：キャンバス -->
        <section class="canvas-area" id="canvas-area">
            <!-- ルーラー -->
            <canvas id="ruler-h" class="ruler-canvas ruler-h hidden"></canvas>
            <canvas id="ruler-v" class="ruler-canvas ruler-v hidden"></canvas>
            <!-- ガイドライン -->
            <div id="guide-container" class="guide-container"></div>

            <div id="canvas-container">
                <div id="canvas" class="slide-canvas"></div>

                <!-- フローティングメニュー（要素に追従） -->
                <div id="floating-menu" class="floating-menu hidden">
                    <div class="float-group text-only-tools" style="display:none;">
                        <button id="float-bold" class="font-style-btn"><b>B</b></button>
                        <button id="float-italic" class="font-style-btn"><i>I</i></button>
                    </div>
                    <div class="float-group">
                        <button class="color-trigger-btn float-color-btn" id="float-color-trigger" data-target="float" title="色">
                            <span class="color-preview" id="float-color-preview" style="background:#0f172a;"></span>
                        </button>
                        <select id="float-anim-select" style="padding:2px 4px;font-size:0.7rem;border-radius:4px;border:1px solid #e2e8f0;">
                            <option value="none">No Anim</option>
                            <option value="fade">Fade</option>
                            <option value="pop">Pop</option>
                            <option value="slide-up">Slide Up</option>
                            <option value="zoom-in">Zoom In</option>
                        </select>
                        <button id="float-layer-front" title="前面へ">
                            <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><rect x="3" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.3" fill="none"/><rect x="1" y="1" width="7" height="7" rx="1" fill="white" stroke="currentColor" stroke-width="1.3"/></svg>
                        </button>
                        <button id="float-send-back" title="背面へ">
                            <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.3" fill="none"/><rect x="4" y="4" width="7" height="7" rx="1" fill="white" stroke="currentColor" stroke-width="1.3"/></svg>
                        </button>
                        <button id="float-delete" class="danger" title="削除">
                            <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2h4v2M5 7v3M9 7v3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M3 4l.6 6.4a1 1 0 001 .9h4.8a1 1 0 001-.9L11 4" stroke="currentColor" stroke-width="1.3"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 右：プロパティパネル -->
        <aside class="props-panel" id="props-panel">
            <div class="props-header">Properties</div>
            <div id="props-no-select" class="props-empty">
                <svg width="28" height="28" viewBox="0 0 32 32" fill="none" opacity="0.2"><rect x="6" y="6" width="20" height="20" rx="3" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M11 16h10M16 11v10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <p>Select an element</p>
            </div>
            <div id="props-content" class="props-content hidden">
                <div class="prop-row">
                    <label>X</label><input type="number" id="prop-x" class="prop-input">
                    <label>Y</label><input type="number" id="prop-y" class="prop-input">
                </div>
                <div class="prop-row">
                    <label>W</label><input type="number" id="prop-w" class="prop-input">
                    <label>H</label><input type="number" id="prop-h" class="prop-input">
                </div>
                <div class="prop-divider"></div>
                <div id="text-props" class="prop-section hidden">
                    <div class="prop-row">
                        <label>Font</label>
                        <select id="prop-fontfamily" class="prop-input" style="width:auto;flex:1;font-size:0.7rem;">
                            <option value="'Noto Sans JP', sans-serif">Noto Sans JP</option>
                            <option value="'Noto Serif JP', serif">Noto Serif JP</option>
                            <option value="'M PLUS 1p', sans-serif">M PLUS 1p</option>
                            <option value="'DotGothic16', sans-serif">DotGothic16</option>
                            <option value="'Kaisei Tokumin', serif">Kaisei Tokumin</option>
                            <option value="'Kiwi Maru', serif">Kiwi Maru</option>
                            <option value="'RocknRoll One', sans-serif">RocknRoll</option>
                            <option value="'Yuji Syuku', serif">Yuji Syuku</option>
                        </select>
                    </div>
                    <div class="prop-row">
                        <label>Size</label><input type="number" id="prop-fontsize" class="prop-input">
                    </div>
                    <div class="prop-row">
                        <label>Color</label>
                        <button class="color-trigger-btn prop-color-btn" id="prop-text-color-btn" data-target="prop-text">
                            <span class="color-preview" id="prop-text-color-preview" style="background:#000000;"></span>
                            <svg width="7" height="7" viewBox="0 0 8 8" fill="none"><path d="M1 2l3 4 3-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                        </button>
                    </div>
                </div>
                <div id="shape-props" class="prop-section hidden">
                    <div class="prop-row">
                        <label>Fill</label>
                        <button class="color-trigger-btn prop-color-btn" id="prop-fill-btn" data-target="prop-fill">
                            <span class="color-preview" id="prop-fill-preview" style="background:#2563eb;"></span>
                            <svg width="7" height="7" viewBox="0 0 8 8" fill="none"><path d="M1 2l3 4 3-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
                        </button>
                    </div>
                    <div class="prop-row" style="flex-wrap:wrap;gap:4px;">
                        <label style="width:100%">Opacity</label>
                        <input type="range" id="prop-opacity" min="0" max="100" value="100" style="flex:1;min-width:60px;">
                        <span id="prop-opacity-val" style="font-size:0.7rem;color:var(--text-muted);min-width:26px;">100%</span>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- プレゼンターオーバーレイ（フルスクリーン用） -->
    <div id="presenter-overlay" class="presenter-overlay hidden">
        <div id="presenter-canvas-wrap" class="presenter-canvas-wrap">
            <!-- キャンバスがJSでここに移動 or クローンされる -->
        </div>
        <div id="presenter-controls" class="presenter-controls">
            <button id="prev-slide">←</button>
            <span id="slide-number">1 / 1</span>
            <button id="next-slide">→</button>
            <button id="exit-present-btn" class="danger">✕ Exit</button>
        </div>
    </div>

</div>
<script src="script.js"></script>
</body>
</html>
