<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesignPro - Ribbon Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body>
    <div id="app">
        <header class="ribbon">
            <div class="ribbon-tabs">
                <button class="tab-link active" onclick="openTab(event, 'tab-home')">ホーム</button>
                <button class="tab-link" onclick="openTab(event, 'tab-insert')">挿入</button>
                <button class="tab-link" onclick="openTab(event, 'tab-design')">デザイン</button>
                <button class="tab-link" onclick="openTab(event, 'tab-export')">ファイル / 書き出し</button>
            </div>

            <div class="ribbon-content">
                <div id="tab-home" class="tab-pane active">
                    <div class="ribbon-group">
                        <div class="group-buttons">
                            <button id="undo-btn" title="元に戻す">元に戻す</button>
                            <button id="redo-btn" title="やり直し">やり直し</button>
                        </div>
                        <span class="group-label">履歴</span>
                    </div>
                    <div class="ribbon-group" id="text-tools">
                        <div class="group-buttons">
                            <select id="font-family">
                                <option value="sans-serif">ゴシック体 (Sans)</option>
                                <option value="serif">明朝体 (Serif)</option>
                                <option value="monospace">等幅 (Mono)</option>
                            </select>
                            <input type="number" id="font-size" value="32" style="width: 60px;">
                            <button id="bold-btn" class="font-style-btn">B</button>
                            <button id="italic-btn" class="font-style-btn">I</button>
                            <div class="color-picker-wrapper">
                                <input type="color" id="element-color" title="色を選択">
                            </div>
                        </div>
                        <span class="group-label">フォント</span>
                    </div>
                    <div class="ribbon-group">
                        <div class="group-buttons">
                            <button id="bring-front-btn">最前面へ</button>
                            <button id="send-back-btn">最背面へ</button>
                            <button id="delete-btn" class="danger">削除</button>
                        </div>
                        <span class="group-label">配置と編集</span>
                    </div>
                </div>

                <div id="tab-insert" class="tab-pane">
                    <div class="ribbon-group">
                        <div class="group-buttons">
                            <button id="add-text-btn">テキストボックス</button>
                            <button id="add-rect-btn">長方形</button>
                            <button id="add-image-btn">画像アップロード</button>
                            <input type="file" id="image-upload" accept="image/*" style="display:none;">
                        </div>
                        <span class="group-label">基本要素</span>
                    </div>
                </div>

                <div id="tab-design" class="tab-pane">
                    <div class="ribbon-group">
                        <div class="group-buttons">
                            <button id="crop-start-btn">トリミング</button>
                            <div class="range-tool">
                                <label for="img-brightness">明るさ</label>
                                <input type="range" id="img-brightness" min="0" max="200" value="100">
                            </div>
                        </div>
                        <span class="group-label">画像加工</span>
                    </div>
                </div>

                <div id="tab-export" class="tab-pane">
                    <div class="ribbon-group">
                        <div class="group-buttons">
                            <button id="present-btn" class="primary">スライドショー開始</button>
                        </div>
                        <span class="group-label">プレゼンテーション</span>
                    </div>
                    <div class="ribbon-group">
                        <div class="group-buttons">
                            <button id="export-pdf-btn">PDF形式で保存</button>
                            <button id="export-pptx-btn">PowerPoint形式 (.pptx)</button>
                        </div>
                        <span class="group-label">ファイル出力</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="main-body">
            <aside class="slide-navigator">
                <div id="slide-list"></div>
                <button id="add-slide-btn">新規スライド</button>
            </aside>

            <section class="canvas-area">
                <div id="canvas-container">
                    <div id="canvas" class="slide-canvas"></div>
                </div>
            </section>
        </div>

        <div id="presenter-controls" class="hidden">
            <button id="prev-slide">前へ</button>
            <span id="slide-number">1 / 1</span>
            <button id="next-slide">次へ</button>
            <button id="exit-present-btn">終了</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
