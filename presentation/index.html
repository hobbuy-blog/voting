<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leaslide | Simple, Easy, Present.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Kaisei+Tokumin&family=Kiwi+Maru&family=M+PLUS+1p:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=RocknRoll+One&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';</script>
</head>
<body>
<div id="app">

    <div id="color-picker-float" class="color-float hidden">
        <div class="color-float-header">
            <span id="color-float-title">Color</span>
            <button id="color-float-close" class="color-float-close">✕</button>
        </div>
        <div class="color-swatches" id="color-swatches"></div>
        <div class="color-float-custom">
            <label style="font-size:0.72rem;color:var(--text-muted)">Custom</label>
            <input type="color" id="color-custom-input" value="#000000">
            <button id="color-custom-apply" class="color-apply-btn">Apply</button>
        </div>
    </div>

    <header class="ribbon">
        <div class="ribbon-tabs">
            <div class="ribbon-logo">
                <span style="color:#2563eb; font-weight:bold; font-size:16px;">Leaslide</span>
            </div>
            <button class="tab-link" onclick="openTab(event,'tab-file')">File</button>
            <button class="tab-link active" onclick="openTab(event,'tab-home')">Home</button>
            <button class="tab-link" onclick="openTab(event,'tab-insert')">Insert</button>
            <button class="tab-link" onclick="openTab(event,'tab-design')">Design</button>
            <button class="tab-link" onclick="openTab(event,'tab-trans')">Transition</button>
            <button class="tab-link" onclick="openTab(event,'tab-animation')">Animation</button>
            <button class="tab-link" onclick="openTab(event,'tab-slideshow')">Slideshow</button>
            <button class="tab-link" onclick="openTab(event,'tab-display')">Display</button>
        </div>

        <div class="ribbon-content">
            <div id="tab-file" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="btn-import-pdf" class="icon-btn secondary">🗎 Import PDF</button>
                        <input type="file" id="pdf-file-input" accept=".pdf" style="display:none;">
                        <button id="btn-import-pptx" class="icon-btn secondary">🗐 Import PPTX</button>
                        <input type="file" id="pptx-file-input" accept=".pptx" style="display:none;">
                    </div>
                    <span class="group-label">Import</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="export-pdf-btn" class="icon-btn">📄 Export PDF</button>
                        <button id="export-pptx-btn" class="icon-btn">⧉ Export PPTX</button>
                    </div>
                    <span class="group-label">Export</span>
                </div>
            </div>

            <div id="tab-home" class="tab-pane active">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="undo-btn" class="icon-btn" title="Ctrl+Z">⟲ Undo</button>
                        <button id="redo-btn" class="icon-btn" title="Ctrl+Y">⟳ Redo</button>
                    </div>
                    <span class="group-label">History</span>
                </div>
                <div class="ribbon-group" id="text-tools">
                    <div class="group-buttons">
                        <select id="font-family" title="フォント">
                            <option value="'Noto Sans JP', sans-serif">Noto Sans JP</option>
                            <option value="'Noto Serif JP', serif">Noto Serif JP</option>
                            <option value="'M PLUS 1p', sans-serif">M PLUS 1p</option>
                            <option value="'Kaisei Tokumin', serif">解星特ミン</option>
                            <option value="'RocknRoll One', sans-serif">RocknRoll</option>
                            <option value="'DotGothic16', sans-serif">DotGothic16</option>
                            <option value="'Kiwi Maru', serif">Kiwi Maru</option>
                            <option value="'Yuji Syuku', serif">Yuji Syuku</option>
                        </select>
                        <input type="number" id="font-size" value="32" title="フォントサイズ" style="width:54px;">
                        <button id="bold-btn" class="font-style-btn" title="太字"><b>B</b></button>
                        <button id="italic-btn" class="font-style-btn" title="斜体"><i>I</i></button>
                        <button id="text-color-btn" class="color-trigger-btn" title="文字色" data-target="text">
                            <span class="color-preview" id="text-color-preview" style="background:#0f172a;"></span> ▾
                        </button>
                    </div>
                    <span class="group-label">Font</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="align-left-btn" class="icon-btn icon-only" title="左揃え">⫷</button>
                        <button id="align-center-btn" class="icon-btn icon-only" title="中央揃え">≡</button>
                        <button id="align-right-btn" class="icon-btn icon-only" title="右揃え">⫸</button>
                    </div>
                    <span class="group-label">Align Text</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="bring-front-btn" class="icon-btn" title="前面へ">▲ Front</button>
                        <button id="send-back-btn" class="icon-btn" title="背面へ">▼ Back</button>
                        <button id="duplicate-btn" class="icon-btn" title="複製 (Ctrl+D)">⧉ Duplicate</button>
                        <button id="delete-btn" class="icon-btn danger" title="削除 (Del)">✕ Delete</button>
                    </div>
                    <span class="group-label">Element</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="shape-color-btn" class="color-trigger-btn" title="図形色" data-target="shape">
                            <span class="color-preview" id="shape-color-preview" style="background:#2563eb;"></span> ▾
                        </button>
                    </div>
                    <span class="group-label">Shape Fill</span>
                </div>
            </div>

            <div id="tab-insert" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="add-text-btn" class="icon-btn">✎ Textbox</button>
                        <button id="add-rect-btn" class="icon-btn">■ Rectangle</button>
                        <button id="add-circle-btn" class="icon-btn">● Circle</button>
                        <button id="add-line-btn" class="icon-btn">― Line</button>
                        <button id="insert-arrow-btn" class="icon-btn">➔ Arrow</button>
                        <button id="insert-star-btn" class="icon-btn">★ Star</button>
                    </div>
                    <span class="group-label">Shapes</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="add-image-btn" class="icon-btn">🖼 Image</button>
                        <input type="file" id="image-upload" accept="image/*" style="display:none;">
                    </div>
                    <span class="group-label">Media</span>
                </div>
            </div>

            <div id="tab-design" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <select id="slide-size-select" style="font-size:0.76rem;padding:4px 6px;border-radius:5px;border:1px solid var(--ribbon-border);">
                            <option value="1920x1080" selected>16:9 (1920×1080)</option>
                            <option value="1280x720">16:9 (1280×720)</option>
                            <option value="1024x768">4:3 (1024×768)</option>
                        </select>
                    </div>
                    <span class="group-label">Canvas Size</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="bg-color-btn" class="color-trigger-btn" title="背景色" data-target="bg">
                            <span class="color-preview" id="bg-color-preview" style="background:#ffffff;border:1px solid #e2e8f0;"></span> ▾
                        </button>
                    </div>
                    <span class="group-label">Background</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button class="theme-swatch" data-bg="#ffffff" title="White" style="background:#fff;border-color:#e2e8f0;"></button>
                        <button class="theme-swatch" data-bg="#0f172a" title="Dark" style="background:#0f172a;"></button>
                        <button class="theme-swatch" data-bg="linear-gradient(135deg,#3b82f6,#1d4ed8)" title="Blue" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8);"></button>
                        <button class="theme-swatch" data-bg="linear-gradient(135deg,#ec4899,#8b5cf6)" title="Pink" style="background:linear-gradient(135deg,#ec4899,#8b5cf6);"></button>
                        <button class="theme-swatch" data-bg="linear-gradient(135deg,#f59e0b,#e11d48)" title="Warm" style="background:linear-gradient(135deg,#f59e0b,#e11d48);"></button>
                        <button class="theme-swatch" data-bg="linear-gradient(135deg,#10b981,#2563eb)" title="Green" style="background:linear-gradient(135deg,#10b981,#2563eb);"></button>
                    </div>
                    <span class="group-label">Themes</span>
                </div>
            </div>

            <div id="tab-trans" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button class="trans-btn icon-btn active" data-trans="none">None</button>
                        <button class="trans-btn icon-btn" data-trans="fade">Fade</button>
                        <button class="trans-btn icon-btn" data-trans="slide">Slide</button>
                        <button class="trans-btn icon-btn" data-trans="zoom">Zoom</button>
                    </div>
                    <span class="group-label">Slide Transition</span>
                </div>
            </div>

            <div id="tab-animation" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button class="anim-set-btn icon-btn active" data-anim="none">None</button>
                        <button class="anim-set-btn icon-btn" data-anim="fade">Fade</button>
                        <button class="anim-set-btn icon-btn" data-anim="pop">Pop</button>
                        <button class="anim-set-btn icon-btn" data-anim="slide-up">Slide Up</button>
                    </div>
                    <span class="group-label">Element Effect</span>
                </div>
            </div>

            <div id="tab-slideshow" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="present-btn" class="icon-btn primary">▻ Start Slideshow</button>
                        <button id="present-from-start-btn" class="icon-btn secondary">► From Beginning</button>
                    </div>
                    <span class="group-label">Presentation</span>
                </div>
            </div>

            <div id="tab-display" class="tab-pane">
                <div class="ribbon-group">
                    <div class="group-buttons">
                        <button id="toggle-grid-btn" class="icon-btn secondary">⊞ Grid</button>
                        <button id="toggle-ruler-btn" class="icon-btn secondary">📏 Ruler</button>
                    </div>
                    <span class="group-label">View</span>
                </div>
                <div class="ribbon-group">
                    <div class="group-buttons" style="gap:10px;">
                        <input type="range" class="zoom-slider-sync" min="10" max="200" value="50" style="width:80px;">
                        <span class="zoom-val-sync" style="font-size:0.75rem; min-width:30px;">50%</span>
                        <button class="icon-btn secondary zoom-fit-sync">Fit</button>
                        <button class="icon-btn secondary zoom-100-sync">100%</button>
                    </div>
                    <span class="group-label">Zoom</span>
                </div>
            </div>

        </div>
    </header>

    <div class="main-body">
        <aside class="slide-navigator">
            <div class="slide-nav-header">
                <span>Slides</span>
                 <button id="add-slide-btn" class="slide-nav-add" title="スライド追加">＋</button>
            </div>
            <div id="slide-list"></div>
            <button id="duplicate-slide-btn" class="slide-nav-del" style="color:var(--text-main); border-color:var(--ribbon-border); margin-bottom: 4px;">⧉ Duplicate Slide</button>
            <button id="delete-slide-btn" class="slide-nav-del">✕ Delete Slide</button>
        </aside>

        <section class="canvas-area" id="canvas-area">
            <canvas id="ruler-h" class="ruler-canvas ruler-h hidden"></canvas>
            <canvas id="ruler-v" class="ruler-canvas ruler-v hidden"></canvas>
            
            <div id="guide-container" class="guide-container"></div>

            <div id="canvas-container">
                <div id="canvas" class="slide-canvas"></div>
            </div>
        </section>

        <aside class="props-panel" id="props-panel">
            <div class="props-header">Properties</div>
            
            <div class="props-scroll">
                <div id="props-no-select" class="props-empty">
                    <p>Select an element</p>
                </div>
                <div id="props-content" class="props-content hidden">
                    <div class="prop-row">
                        <label>X</label><input type="number" id="prop-x" class="prop-input">
                        <label>Y</label><input type="number" id="prop-y" class="prop-input">
                    </div>
                    <div class="prop-row">
                        <label>W</label><input type="number" id="prop-w" class="prop-input">
                        <label>H</label><input type="number" id="prop-h" class="prop-input">
                    </div>
                    <div id="text-props" class="prop-section hidden">
                        <div class="prop-row">
                            <label>Size</label><input type="number" id="prop-fontsize" class="prop-input">
                        </div>
                    </div>
                    <div id="shape-props" class="prop-section hidden">
                        <div class="prop-row" style="flex-wrap:wrap;gap:4px;">
                            <label style="width:100%">Opacity</label>
                            <input type="range" id="prop-opacity" min="0" max="100" value="100" style="flex:1;min-width:60px;">
                        </div>
                    </div>
                </div>
            </div>

            <div class="props-zoom-footer">
                <div class="zoom-footer-title">Zoom</div>
                <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
                    <input type="range" class="zoom-slider-sync" min="10" max="200" value="50" style="flex:1;">
                    <span class="zoom-val-sync" style="font-size:0.7rem; color:var(--text-muted); min-width:32px; text-align:right;">50%</span>
                </div>
                <div style="display:flex; gap:4px;">
                    <button class="icon-btn secondary zoom-fit-sync" style="flex:1; justify-content:center;">Fit</button>
                    <button class="icon-btn secondary zoom-100-sync" style="flex:1; justify-content:center;">100%</button>
                </div>
            </div>
        </aside>
    </div>

    <div id="presenter-overlay" class="presenter-overlay hidden">
        <div id="presenter-canvas-wrap" class="presenter-canvas-wrap"></div>
        <div id="presenter-controls" class="presenter-controls">
            <button id="prev-slide">← Prev</button>
            <span id="slide-number">1 / 1</span>
            <button id="next-slide">Next →</button>
            <button id="exit-present-btn" class="danger">✕ Exit</button>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
