<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaslide | Simple, Easy, Presentate.</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Kaisei+Tokumin&family=Kiwi+Maru&family=M+PLUS+1p:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=RocknRoll+One&family=Yuji+Syuku&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>
    <div id="app">
        <header class="ribbon">
            <div class="ribbon-tabs">
                <button class="tab-link active" onclick="openTab(event, 'tab-home')">Home</button>
                <button class="tab-link" onclick="openTab(event, 'tab-insert')">Insert</button>
                <button class="tab-link" onclick="openTab(event, 'tab-animation')">Animation</button>
                <button class="tab-link" onclick="openTab(event, 'tab-export')">FailIO</button>
            </div>

            <div class="ribbon-content">
                <div id="tab-home" class="tab-pane active">
                    <div class="ribbon-group">
                        <div class="group-buttons">
                            <button id="undo-btn" title="元に戻す">Undo</button>
                            <button id="redo-btn" title="やり直し">Redo</button>
                        </div>
                        <span class="group-label">History</span>
                    </div>
                    <div class="ribbon-group" id="text-tools">
                        <div class="group-buttons">
                            <select id="font-family">
                                <option value="'Noto Sans JP', sans-serif">Noto Sans JP (Default Gothic)</option>
                                <option value="'Noto Serif JP', serif">Noto Serif JP (Default Serif)</option>
                                <option value="'M PLUS 1p', sans-serif">M PLUS 1p (Modern Round)</option>
                                <option value="'Kaisei Tokumin', serif">解星特ミン  (Retro Serif)</option>
                                <option value="'RocknRoll One', sans-serif">RocknRoll (Pop)</option>
                                <option value="'DotGothic16', sans-serif">DotGothic16 (Dot Gothic)</option>
                                <option value="'Kiwi Maru', serif">Kiwi Round (Soft Round)</option>
                                <option value="'Yuji Syuku', serif">Yuji Syuku (Calligraphic)</option>
                            </select>
                            <input type="number" id="font-size" value="32" style="width: 60px;">
                            <button id="bold-btn" class="font-style-btn">B</button>
                            <button id="italic-btn" class="font-style-btn">I</button>
                            <div class="color-picker-wrapper">
                                <input type="color" id="element-color" title="色を選択">
                            </div>
                        </div>
                        <span class="group-label">Font</span>
                    </div>
                    <div class="ribbon-group">
                        <div class="group-buttons">
                            <button id="bring-front-btn">Forward</button>
                            <button id="send-back-btn">Background</button>
                            <button id="delete-btn" class="danger">Delate</button>
                        </div>
                        <span class="group-label">Element Config</span>
                    </div>
                </div>

                <div id="tab-insert" class="tab-pane">
                    <div class="ribbon-group">
                        <div class="group-buttons">
                            <button id="add-text-btn">Textbox</button>
                            <button id="add-rect-btn">Rectangle</button>
                            <button id="add-image-btn">Image</button>
                            <input type="file" id="image-upload" accept="image/*" style="display:none;">
                        </div>
                        <span class="group-label">Basic Element</span>
                    </div>
                </div>

                <div id="tab-animation" class="tab-pane">
                    <div class="ribbon-group">
                        <div class="group-buttons">
                            <button class="anim-set-btn" data-anim="none">None</button>
                            <button class="anim-set-btn" data-anim="fade">Fade</button>
                            <button class="anim-set-btn" data-anim="pop">Pop</button>
                            <button class="anim-set-btn" data-anim="slide-up">Sliding Up</button>
                            <button class="anim-set-btn" data-anim="zoom-in">Zoom In</button>
                        </div>
                        <span class="group-label">Effect</span>
                    </div>
                </div>

                <div id="tab-export" class="tab-pane">
                    <div class="ribbon-group">
                        <div class="group-buttons">
                            <button id="btn-import-pdf" class="secondary">Import PDF</button>
                            <input type="file" id="pdf-file-input" accept=".pdf" style="display:none;">
                            <button id="btn-import-pptx" class="secondary" onclick="alert('Importing PPTX file is now developing. For this time, please import PDF instead of PPTX.')">Import PPTX</button>
                        </div>
                        <span class="group-label">Import</span>
                    </div>
                    <div class="ribbon-group">
                        <div class="group-buttons">
                            <button id="present-btn" class="primary">Slideshow</button>
                        </div>
                        <span class="group-label">Presentation</span>
                    </div>
                    <div class="ribbon-group">
                        <div class="group-buttons">
                            <button id="export-pdf-btn">Export PDF</button>
                            <button id="export-pptx-btn">Export PPTX</button>
                        </div>
                        <span class="group-label">Export</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="main-body">
            <aside class="slide-navigator">
                <div id="slide-list"></div>
                <button id="add-slide-btn">Add a Page</button>
            </aside>

            <section class="canvas-area">
                <div id="canvas-container">
                    <div id="canvas" class="slide-canvas"></div>
                    
                    <div id="floating-menu" class="floating-menu hidden">
                        <div class="float-group text-only-tools">
                            <button id="float-bold" class="font-style-btn">B</button>
                            <button id="float-italic" class="font-style-btn">I</button>
                        </div>
                        <div class="float-group">
                            <div class="color-picker-wrapper mini">
                                <input type="color" id="float-color" title="色">
                            </div>
                            <select id="float-anim-select" style="padding: 2px; font-size: 0.75rem;">
                                <option value="none">None</option>
                                <option value="fade">Fade</option>
                                <option value="pop">Pop</option>
                                <option value="slide-up">Sliding Up</option>
                                <option value="zoom-in">Zoom In</option>
                            </select>
                            <button id="float-layer-front" title="前面へ">Forward</button>
                            <button id="float-delete" class="danger" title="削除">Background</button>
                        </div>
                    </div>
                    
                </div>
            </section>
        </div>

        <div id="presenter-controls" class="hidden">
            <button id="prev-slide">Previous</button>
            <span id="slide-number">1 / 1</span>
            <button id="next-slide">Next</button>
            <button id="exit-present-btn">Exit</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
