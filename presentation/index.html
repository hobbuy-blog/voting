<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leaslide | Simple, Easy, Present.</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Kaisei+Tokumin&family=Kiwi+Maru&family=M+PLUS+1p:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=RocknRoll+One&family=Yuji+Syuku&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';</script>
</head>
<body>
    <div class="app-container">
        <header class="ribbon-bar">
            <div class="tabs-header">
                <button class="tab-link active" onclick="openTab(event, 'tab-home')">Home</button>
                <button class="tab-link" onclick="openTab(event, 'tab-insert')">Insert</button>
                <button class="tab-link" onclick="openTab(event, 'tab-design')">Design</button>
                <button class="tab-link" onclick="openTab(event, 'tab-animation')">Animation</button>
                <button class="tab-link" onclick="openTab(event, 'tab-slideshow')">Slideshow</button>
            </div>

            <div class="tabs-content">
                <div id="tab-home" class="tab-pane active">
                    <div class="tool-group">
                        <div class="group-title">Add Elements</div>
                        <button id="add-text-btn" class="tool-btn">✎ Text</button>
                        <button id="add-rect-btn" class="tool-btn">■ Rectangle</button>
                        <button id="add-circle-btn" class="tool-btn">● Circle</button>
                        <button id="add-line-btn" class="tool-btn">― Line</button>
                    </div>
                    <div class="tool-group text-only-tools" style="display: none;">
                        <div class="group-title">Typography & Color</div>
                        <select id="font-family" class="prop-input" style="width:110px;">
                            <option value="'Noto Sans JP', sans-serif">Standard</option>
                            <option value="'Noto Serif JP', serif">Serif</option>
                            <option value="'M PLUS 1p', sans-serif">M PLUS</option>
                            <option value="'DotGothic16', sans-serif">Gothic</option>
                        </select>
                        <input type="number" id="font-size" class="prop-input" style="width:50px;" value="32">
                        <input type="color" id="element-color" value="#0f172a" title="Text Color">
                        <button id="bold-btn" class="tool-btn compact"><b>B</b></button>
                        <button id="italic-btn" class="tool-btn compact"><i>I</i></button>
                        <button id="align-left-btn" class="tool-btn compact">▤ L</button>
                        <button id="align-center-btn" class="tool-btn compact">▥ C</button>
                        <button id="align-right-btn" class="tool-btn compact">▥ R</button>
                    </div>
                    <div class="tool-group">
                        <div class="group-title">Arrange</div>
                        <button id="bring-front-btn" class="tool-btn">▲ Front</button>
                        <button id="send-back-btn" class="tool-btn">▼ Back</button>
                        <button id="duplicate-btn" class="tool-btn">⧉ Duplicate</button>
                        <button id="delete-btn" class="tool-btn danger">✕ Delete</button>
                    </div>
                    <div class="tool-group">
                        <div class="group-title">Options</div>
                        <label style="display:flex; align-items:center; gap:4px; font-size:0.75rem;">
                            <input type="checkbox" id="snap-toggle" checked> Snap Grid
                        </label>
                        <button id="run-proofread-btn" class="tool-btn">📊 Statistics</button>
                    </div>
                </div>

                <div id="tab-insert" class="tab-pane">
                    <div class="tool-group">
                        <div class="group-title">Shapes</div>
                        <button id="insert-arrow-btn" class="tool-btn">➔ Arrow</button>
                        <button id="insert-star-btn" class="tool-btn">★ Star</button>
                    </div>
                    <div class="tool-group">
                        <div class="group-title">Media & Documents</div>
                        <button id="add-image-btn" class="tool-btn">🖼 Insert Image</button>
                        <input type="file" id="image-upload" accept="image/*" class="hidden">
                        <button id="btn-import-pdf" class="tool-btn">🗎 Import PDF Pages</button>
                        <input type="file" id="pdf-file-input" accept=".pdf" class="hidden">
                    </div>
                </div>

                <div id="tab-design" class="tab-pane">
                    <div class="tool-group">
                        <div class="group-title">Canvas Resolution Size</div>
                        <select id="slide-size-select" class="prop-input" style="width:160px; padding:4px; font-weight:bold;">
                            <option value="1920x1080" selected>16:9 Landscape (1920 × 1080)</option>
                            <option value="1024x768">4:3 Desktop (1024 × 768)</option>
                        </select>
                    </div>
                    <div class="tool-group">
                        <div class="group-title">Solid Colors</div>
                        <div class="theme-swatch" style="background:#ffffff;" data-bg="#ffffff"></div>
                        <div class="theme-swatch" style="background:#f8fafc;" data-bg="#f8fafc"></div>
                        <div class="theme-swatch" style="background:#0f172a;" data-bg="#0f172a"></div>
                        <div class="theme-swatch" style="background:#fef2f2;" data-bg="#fef2f2"></div>
                        <div class="theme-swatch" style="background:#ecfdf5;" data-bg="#ecfdf5"></div>
                    </div>
                    <div class="tool-group">
                        <div class="group-title">Gradients</div>
                        <div class="theme-swatch" style="background:linear-gradient(135deg, #3b82f6, #1d4ed8);" data-bg="linear-gradient(135deg, #3b82f6, #1d4ed8)"></div>
                        <div class="theme-swatch" style="background:linear-gradient(135deg, #ec4899, #8b5cf6);" data-bg="linear-gradient(135deg, #ec4899, #8b5cf6)"></div>
                        <div class="theme-swatch" style="background:linear-gradient(135deg, #f59e0b, #e11d48);" data-bg="linear-gradient(135deg, #f59e0b, #e11d48)"></div>
                    </div>
                </div>

                <div id="tab-animation" class="tab-pane">
                    <div class="tool-group">
                        <div class="group-title">Entrance Effects</div>
                        <button class="tool-btn anim-set-btn" data-anim="none">None</button>
                        <button class="tool-btn anim-set-btn" data-anim="fade">⟳ Fade In</button>
                        <button class="tool-btn anim-set-btn" data-anim="pop">💥 Pop Up</button>
                        <button class="tool-btn anim-set-btn" data-anim="slide-up">↑ Slide Up</button>
                    </div>
                </div>

                <div id="tab-slideshow" class="tab-pane">
                    <div class="tool-group">
                        <div class="group-title">Run Presentation</div>
                        <button id="present-btn" class="tool-btn primary">🖵 Play From Current</button>
                    </div>
                    <div class="tool-group">
                        <div class="group-title">File Export</div>
                        <button id="export-pdf-btn" class="tool-btn">🖺 Export PDF</button>
                        <button id="export-pptx-btn" class="tool-btn">📊 Export PPTX</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="workspace">
            <aside class="sidebar">
                <div class="sidebar-header">Slides Deck</div>
                <div id="slide-list"></div>
                <button id="add-slide-btn" class="sidebar-action-btn">+ New Slide</button>
                <button id="delete-slide-btn" class="sidebar-action-btn danger-btn">✕ Delete Current</button>
                
                <div id="proofread-result" style="margin-top:20px; font-size:0.75rem; color:var(--text-muted); line-height:1.4;"></div>
            </aside>

            <main id="canvas-container" class="canvas-area-wrapper">
                <div id="canvas" class="canvas-area">
                    </div>

                <div class="zoom-indicator">
                    <button id="zoom-out" title="Zoom Out"> ― </button>
                    <span id="zoom-val">100%</span>
                    <button id="zoom-in" title="Zoom In"> + </button>
                    <button id="zoom-reset" style="font-size:0.68rem; padding:2px 4px;">Reset</button>
                </div>
            </main>

            <aside class="properties-panel">
                <div class="panel-header">Properties Panel</div>
                <div id="props-no-select" class="panel-empty">Select any object to modify properties</div>
                <div id="props-content" class="panel-main hidden">
                    <div class="prop-section">
                        <div class="section-title">Geometry Mapping</div>
                        <div class="prop-row"><label>X Position</label><input type="number" id="prop-x" class="prop-input"></div>
                        <div class="prop-row"><label>Y Position</label><input type="number" id="prop-y" class="prop-input"></div>
                        <div class="prop-row"><label>Width (W)</label><input type="number" id="prop-w" class="prop-input"></div>
                        <div class="prop-row"><label>Height (H)</label><input type="number" id="prop-h" class="prop-input"></div>
                    </div>
                    <div id="text-props" class="prop-section hidden">
                        <div class="section-title">Text Options</div>
                        <div class="prop-row">
                            <label>Size (px)</label>
                            <input type="number" id="prop-fontsize" class="prop-input">
                        </div>
                        <div class="prop-row">
                            <label>Text Color</label>
                            <input type="color" id="prop-color">
                        </div>
                    </div>
                    <div id="shape-props" class="prop-section hidden">
                        <div class="section-title">Fill Style</div>
                        <div class="prop-row">
                            <label>Background</label>
                            <input type="color" id="prop-fill">
                        </div>
                        <div class="prop-row">
                            <label>Opacity</label>
                            <input type="range" id="prop-opacity" min="0" max="100" value="100" style="flex:1;">
                            <span id="prop-opacity-val">100%</span>
                        </div>
                    </div>
                </div>
            </aside>
        </div>

        <div id="floating-menu" class="hidden">
            <input type="color" id="float-color" value="#0f172a" title="Quick Color Picker">
            <select id="float-anim-select" class="prop-input" style="width:85px; font-size:0.68rem; height:22px;">
                <option value="none">No Anim</option>
                <option value="fade">Fade</option>
                <option value="pop">Pop</option>
                <option value="slide-up">SlideUp</option>
            </select>
            <input type="number" id="anim-delay" class="prop-input" style="width:36px; height:22px; font-size:0.68rem;" value="0" step="0.1" title="Delay (sec)">
            <button id="float-delete-btn" class="danger" title="Delete Element">✕</button>
        </div>

        <div id="presenter-controls" class="hidden">
            <button id="prev-slide">← Prev</button>
            <span id="slide-number">1 / 1</span>
            <button id="next-slide">Next →</button>
            <button id="exit-present-btn" class="danger">✕ Exit Presentation</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
